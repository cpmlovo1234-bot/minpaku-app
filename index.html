<body>
  <header class="hero">

  <main class="container">

<script>
const SHEET_ID = '1Ufs6XQpKfS51cD7Hlr6qS3s4rNuJ7BdJ';
const SHEET_NAME = 'Q&A一覧';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

let QA_DATA = [];
let CATEGORIES = [];
let PROPERTIES = [];
let dataLoaded = false;

// gviz が返す CSV（引用符内のカンマ・改行・""エスケープ）に対応した簡易パーサー
function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else { inQuotes = false; }
      } else {
        field += ch;
      }
    } else if (ch === '"') {
      inQuotes = true;
    } else if (ch === ',') {
      row.push(field); field = '';
    } else if (ch === '\r') {
      // skip
    } else if (ch === '\n') {
      row.push(field); rows.push(row); row = []; field = '';
    } else {
      field += ch;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function renderLoading() {
  document.getElementById('resultMeta').textContent = '';
  document.getElementById('chat').innerHTML = '<div class="empty-state">Q&amp;Aデータを読み込み中…</div>';
}

async function loadData() {
  renderLoading();
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csvText = await res.text();
    const rows = parseCSV(csvText);

    QA_DATA = rows.slice(1)
      .map(r => ({ c: (r[1] || '').trim(), p: (r[2] || '').trim(), q: (r[3] || '').trim(), a: (r[4] || '').trim() }))
      .filter(d => d.q && d.a);

    CATEGORIES = [...new Set(QA_DATA.map(d => d.c))].filter(Boolean).sort();
    PROPERTIES = [...new Set(QA_DATA.map(d => d.p))].filter(Boolean).sort();

    populateSelect('categoryFilter', CATEGORIES, 'カテゴリ：すべて');
    populateSelect('propertyFilter', PROPERTIES, '物件：すべて');
    document.getElementById('qaCount').textContent = QA_DATA.length;

    dataLoaded = true;
    runSearch();
  } catch (err) {
    document.getElementById('resultMeta').textContent = '';
    document.getElementById('chat').innerHTML =
      '<div class="empty-state">データの読み込みに失敗しました。スプレッドシートの共有設定（リンクを知っている全員が閲覧可）をご確認のうえ、再読み込みしてください。<br><br>' + escapeHtml(String(err.message || err)) + '</div>';
  }
}

// 「状況」を社内用語に変換するための同義語・概念辞書
// 「早くチェックインしたい」→アーリーチェックイン、「車を止めたい」→駐車場 のように
// ゲストの自然な言い回しを Q&A 内のキーワードへ橋渡しする
const CONCEPTS = [
  { any: ['早く到着', '早めに到着', '早く着き', '早めに着き', '早くチェックイン', '早めにチェックイン', '午前中に着き', '朝早く着き', '12時前に', '早く部屋に入り', 'アーリーチェックイン', 'アーリー'],
    boost: ['アーリーチェックイン', 'チェックイン', '清掃完了', '12時', '15時', '早め'], cats: ['チェックイン'] },
  { any: ['遅く到着', '夜遅く着き', '深夜に着き', '到着が遅れ', '遅れて到着', '夜中に着き', 'レイトチェックイン'],
    boost: ['チェックイン', '到着', 'ドアコード', '深夜'], cats: ['チェックイン', 'Beds24・ドアコード', 'アクセス'] },
  { any: ['ゆっくり出たい', '遅くまで部屋に', 'チェックアウトを遅く', '遅めにチェックアウト', '延泊したい', 'もう一泊', 'レイトチェックアウト', '連泊したい', '滞在を延ばし', '泊数を増やしたい'],
    boost: ['チェックアウト', '延泊', '追加料金', '延長'], cats: ['チェックアウト', '延泊・追加料金'] },
  { any: ['車を止め', '車を停め', '車で行き', '車で来', '駐車したい', '駐車できます', '駐車スペース', '駐車場', 'パーキング', 'コインパーキング'],
    boost: ['駐車場', 'コインパーキング', '駐車'], cats: ['駐車場'] },
  { any: ['ゴミを出し', 'ごみを出し', 'ゴミを捨て', 'ごみを捨て', 'ゴミの捨て方', 'ゴミ出し', 'ゴミ回収', '分別', 'ごみ収集'],
    boost: ['ゴミ', '回収', '分別', '玄関'], cats: ['ゴミ・清掃'] },
  { any: ['wifi', 'Wi-Fi', 'WIFI', 'ワイファイ', 'インターネット', 'ネット環境', 'ネットワーク', 'パスワードを教え'],
    boost: ['Wi-Fi', 'パスワード', 'インターネット'], cats: ['設備・備品'] },
  { any: ['鍵が開かない', 'ドアが開かない', '部屋に入れない', '暗証番号', 'ドアコード', 'オートロック', '解錠', 'コードが届'],
    boost: ['ドアコード', '暗証番号', 'Beds24'], cats: ['Beds24・ドアコード', 'チェックイン', 'トラブル・設備'] },
  { any: ['お湯が出ない', 'お湯が出ません', 'シャワーが冷た', '給湯器', 'お湯出ない', 'お湯が出にくい'],
    boost: ['お湯', '給湯器'], cats: ['トラブル・設備'] },
  { any: ['エアコンが効かない', 'エアコンがつかない', '暖房がつかない', '冷房がつかない', 'エアコンの使い方', '暖房の使い方', 'エアコンが壊れ'],
    boost: ['エアコン', '使い方'], cats: ['設備・備品', 'トラブル・設備'] },
  { any: ['タオルを交換', 'タオルが足りない', 'タオル交換', '追加のタオル', 'タオルが汚れ'],
    boost: ['タオル', '交換'], cats: ['ゴミ・清掃'] },
  { any: ['アメニティ', 'シャンプー', '歯ブラシ', 'コンディショナー', 'ボディソープ'],
    boost: ['アメニティ'], cats: ['設備・備品'] },
  { any: ['荷物を預け', 'スーツケースを置', '荷物を置いて', '荷物を一時的に', '荷物だけ先に', 'チェックイン前に荷物', 'チェックアウト後に荷物', '荷物を先に送り'],
    boost: ['荷物', '預か'], cats: ['荷物・近隣'] },
  { any: ['うるさい', '騒音', '音がする', '声が大きい', '近所から注意', '近隣から', '工事の音'],
    boost: ['近隣', '音', '注意'], cats: ['荷物・近隣', 'トラブル・設備'] },
  { any: ['キャンセルしたい', '予約を取り消し', 'キャンセル料', '予約のキャンセル', 'キャンセルポリシー', '予約を取消'],
    boost: ['キャンセル', '規定'], cats: ['キャンセル'] },
  { any: ['パスポート', '本人確認', '身分証', 'ID提示', 'パスポートの提示', 'パスポート提出', '身分証明書'],
    boost: ['パスポート', '本人確認'], cats: ['パスポート'] },
  { any: ['壊れて', '故障', '動かない', 'つかない', '出ません', '水漏れ', '不具合', '修理してほしい'],
    boost: ['故障', '修理', '写真'], cats: ['トラブル・設備'] },
  { any: ['行き方', '道がわからない', '駅から', 'アクセス方法', '迷って', '場所がわからない', '最寄り駅', '道順'],
    boost: ['アクセス', '駅', '行き方'], cats: ['アクセス'] },
  { any: ['タバコ', '喫煙', 'タバコを吸', '電子タバコ'],
    boost: ['禁煙', '喫煙'], cats: ['設備・備品', 'トラブル・設備'] },
  { any: ['洗濯機', '洗濯したい', '乾燥機', '洗濯の仕方', '洗濯できます'],
    boost: ['洗濯機', '乾燥'], cats: ['設備・備品'] },
  { any: ['請求', '支払い', 'クレジットカード', 'Square', '領収書', 'インボイス', '料金の明細', '宿泊明細'],
    boost: ['請求', 'Square', '明細'], cats: ['請求・Square', '宿泊明細'] },
  { any: ['Airbnb', 'エアビー'],
    boost: ['Airbnb'], cats: ['Airbnb操作'] },
  { any: ['Booking.com', 'ブッキングドットコム', 'Booking'],
    boost: ['Booking'], cats: ['Booking操作'] },
  { any: ['メッセージの返信', 'テンプレ', '定型文', '返信の仕方', 'メッセージ対応'],
    boost: ['メッセージ', 'テンプレート'], cats: ['メッセージ対応'] },
  { any: ['シフト', '勤怠', '出勤', 'タイムカード', '給料', 'シフト希望'],
    boost: ['シフト', '勤怠'], cats: ['勤怠・シフト'] },
  { any: ['鳴川', 'ららさん'],
    boost: ['鳴川様'], cats: ['鳴川様連携'] },
];

function normalize(s) {
  return (s || '')
    .toString()
    .toLowerCase()
    .replace(/[\s　]/g, '')
    .replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
}

function bigrams(s) {
  if (s.length <= 1) return s ? [s] : [];
  const out = [];
  for (let i = 0; i < s.length - 1; i++) out.push(s.substr(i, 2));
  return out;
}

function expandQuery(query) {
  const boost = new Set();
  const cats = new Set();
  for (const c of CONCEPTS) {
    if (c.any.some(t => query.includes(t))) {
      c.boost.forEach(b => boost.add(b));
      (c.cats || []).forEach(cat => cats.add(cat));
    }
  }
  return { boost: [...boost], cats: [...cats] };
}

function scoreEntry(nq, qBigrams, entry, boost, cats) {
  const nQ = normalize(entry.q);
  const nA = normalize(entry.a);
  let s = 0;

  if (nq) {
    if (nQ.includes(nq)) s += 60;
    else if (nA.includes(nq)) s += 25;

    if (qBigrams.length) {
      const eb = new Set(bigrams(nQ + nA));
      let overlap = 0;
      for (const g of qBigrams) { if (eb.has(g)) overlap++; }
      s += (overlap / qBigrams.length) * 35;
    }
  }

  for (const term of boost) {
    const nt = normalize(term);
    if (nQ.includes(nt)) s += 18;
    else if (nA.includes(nt)) s += 9;
  }

  if (cats.includes(entry.c)) s += 22;

  return s;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

// 回答文中の URL（http/https）をクリック可能なリンクへ変換する
// 安全な URI 文字のみを URL の一部として扱うため、URL に隣接する日本語の文章や
// 全角の句読点・かっこは自然に URL から除外される
const URL_PATTERN = /https?:\/\/[-\w.~:/?#\[\]@!$&'()*+,;=%]+/g;

function linkifyText(rawText) {
  let result = '';
  let lastIndex = 0;

  for (const match of rawText.matchAll(URL_PATTERN)) {
    const offset = match.index;
    result += escapeHtml(rawText.slice(lastIndex, offset));

    let url = match[0];
    let trailing = '';
    const trailingPunct = url.match(/[).,;:!?]+$/);
    if (trailingPunct) {
      trailing = trailingPunct[0];
      url = url.slice(0, url.length - trailing.length);
      // 閉じかっこが URL 内の開きかっこに対応する場合は URL 側に戻す
      while (trailing.startsWith(')') && (url.split('(').length - 1) > (url.split(')').length - 1)) {
        url += ')';
        trailing = trailing.slice(1);
      }
    }

    const safeUrl = escapeHtml(url);
    result += `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a>${escapeHtml(trailing)}`;
    lastIndex = offset + match[0].length;
  }

  result += escapeHtml(rawText.slice(lastIndex));
  return result;
}

function populateSelect(id, items, defaultLabel) {
  const sel = document.getElementById(id);
  const opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = defaultLabel;
  sel.appendChild(opt0);
  items.forEach(it => {
    const opt = document.createElement('option');
    opt.value = it;
    opt.textContent = it;
    sel.appendChild(opt);
  });
}

function runSearch() {
  if (!dataLoaded) { renderLoading(); return; }

  const query = document.getElementById('searchInput').value.trim();
  const catFilter = document.getElementById('categoryFilter').value;
  const propFilter = document.getElementById('propertyFilter').value;

  const nq = normalize(query);
  const qBigrams = bigrams(nq);
  const { boost, cats } = query ? expandQuery(query) : { boost: [], cats: [] };

  let results = QA_DATA.map((entry, idx) => ({
    entry,
    idx,
    score: query ? scoreEntry(nq, qBigrams, entry, boost, cats) : 0,
  }));

  if (catFilter) results = results.filter(r => r.entry.c === catFilter);
  if (propFilter) results = results.filter(r => r.entry.p === propFilter || r.entry.p === '全物件');

  if (query) {
    results = results.filter(r => r.score > 0.5);
    results.sort((a, b) => b.score - a.score || a.idx - b.idx);
    results = results.slice(0, 30);
  } else if (catFilter || propFilter) {
    results = results.slice(0, 100);
  } else {
    results = [];
  }

  renderResults(results, query, catFilter, propFilter);
}

function renderResults(results, query, catFilter, propFilter) {
  const chat = document.getElementById('chat');
  const meta = document.getElementById('resultMeta');

  if (results.length === 0) {
    if (query || catFilter || propFilter) {
      meta.textContent = `「${query}」に一致するQ&Aが見つかりませんでした`;
      chat.innerHTML = '<div class="empty-state">該当するQ&Aが見つかりませんでした。キーワードを変えてお試しください。</div>';
    } else {
      meta.textContent = '';
      chat.innerHTML = '<div class="empty-state">&#128269; 質問や状況を入力するか、上の「よくある質問」から選んでください。<br>例：早くチェックインしたい / 車を止めたい / Wi-Fiのパスワード</div>';
    }
    return;
  }

  meta.textContent = query
    ? `「${query}」に関連するQ&A ${results.length}件`
    : `Q&A ${results.length}件を表示中`;

  chat.innerHTML = results.map(r => {
    const e = r.entry;
    return `
    <div class="qa-item">
      <div class="tags">
        <span class="tag">${escapeHtml(e.c)}</span>
        <span class="tag tag-prop">${escapeHtml(e.p)}</span>
      </div>
      <div class="bubble-row">
        <div class="avatar avatar-q">&#128100;</div>
        <div class="bubble bubble-q">${escapeHtml(e.q)}</div>
      </div>
      <div class="bubble-row row-a">
        <div class="bubble bubble-a">${linkifyText(e.a)}</div>
        <div class="avatar avatar-a">&#127968;</div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('searchBtn').addEventListener('click', runSearch);
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
document.getElementById('searchInput').addEventListener('input', runSearch);
document.getElementById('categoryFilter').addEventListener('change', runSearch);
document.getElementById('propertyFilter').addEventListener('change', runSearch);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('categoryFilter').value = '';
  document.getElementById('propertyFilter').value = '';
  runSearch();
});
document.querySelectorAll('.example-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('searchInput').value = btn.dataset.q;
    runSearch();
  });
});

loadData();
</script>
</body>
</html>
