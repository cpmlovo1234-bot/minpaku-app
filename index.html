<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>民泊スタッフ Q&Aアシスタント</title>
<style>
  :root {

  }
  * { box-sizing: border-box; }
  body {
    margin: 0;

  .hero {

  }

  }
  .hero .subtitle {
    margin: 0;

    opacity: 0.92;
  }
  .container {

    padding: 0 16px;
  }
  .search-card {
    background: #fff;

  }

    height: 48px;

    margin-top: 12px;

  }

    color: #374151;

  .clear-btn {
    padding: 10px 18px;
    border-radius: 20px;

    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .example-label {
    font-size: 0.78rem;
    color: #9ca3af;
    margin-right: 2px;
  }
  .example-chip {
    background: #eef3ff;
    color: var(--blue2);
    border: none;
    border-radius: 14px;
    padding: 6px 12px;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .example-chip:hover { background: #dce8ff; }
  .result-meta {
    margin: 22px 6px 12px;
    color: #6b7280;
    font-size: 0.85rem;
  }
  .chat {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-bottom: 20px;
  }
  .qa-item { display: flex; flex-direction: column; gap: 6px; }
  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding-left: 36px;
  }
  .tag {
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 10px;
    background: #eef3ff;
    color: var(--blue2);
    white-space: nowrap;
  }
  .tag-prop { background: #f1f5f9; color: #64748b; }
  .bubble-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }
  .bubble-row.row-a { justify-content: flex-end; }
  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    flex-shrink: 0;
    background: #e5e9f0;
  }
  .avatar-a { background: var(--blue2); color: #fff; }
  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.6;
    font-size: 0.92rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble-q {
    background: #f1f3f6;
    color: #1f2937;
    border-bottom-left-radius: 4px;
  }
  .bubble-a {
    background: linear-gradient(135deg, var(--blue1), var(--blue2));
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .empty-state {
    text-align: center;
    color: #9ca3af;
    padding: 60px 24px;
    font-size: 0.92rem;
    line-height: 1.8;
  }
  .footer {
    text-align: center;
    color: #b0b8c4;
    font-size: 0.78rem;
    padding: 10px 0 30px;
  }
</style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <h1>&#127968; 民泊スタッフ Q&amp;Aアシスタント</h1>

  <main class="container">

      <div class="example-row">
        <span class="example-label">よくある質問:</span>
        <button class="example-chip" data-q="早くチェックインしたい">早くチェックインしたい</button>
        <button class="example-chip" data-q="車を止めたい">車を止めたい</button>
        <button class="example-chip" data-q="Wi-Fiのパスワードを教えて">Wi-Fiのパスワード</button>
        <button class="example-chip" data-q="ゴミを出したい">ゴミの出し方</button>
        <button class="example-chip" data-q="タオルを交換してほしい">タオル交換</button>
        <button class="example-chip" data-q="キャンセルしたい">キャンセルしたい</button>
      </div>
    </div>

    <div id="resultMeta" class="result-meta"></div>
    <div id="chat" class="chat"></div>
  </main>

  <div class="footer">minpaku Q&amp;A Search</div>

い。"},{"c":"チェックイン","p":"全物件","q":"朝9時・10時・11時に着きたい（超アーリー）","a":"前日からのご予約が確実です。前日ゲストのチェックアウトが11時のため、同日はご案内が難しい場合があります。"},{"c":"チェックイン","p":"全物件","q":"ドアコードはいつ届きますか？","a":"チェックイン1週間前に初回お送りし、2?3日前に再送します。"},{"c":"チェックイン","p":"全物件","q":"ドアコードが届いていません","a":"Bedsのメッセージ・メール・OTAのメッセージをご確認ください。改めてお送りします。"},{"c":"チェックイン","p":"全物件","q":"ドアコードが使えません・開きません","a":"コードを再確認します。リモートロック管理画面を確認しますので少々お待ちください。"},{"c":"チェックイン","p":"全物件","q":"チェックインの案内（ガイド）が見られません","a":"PDFをメールまたはメッセージでお送りします。"},{"c":"チェックイン","p":"全物件","q":"部屋の鍵はスマートロックですか？","a":"はい、スマートロック（ドアコード入力式）です。フロントへのお立ち寄りは不要です。"},{"c":"チェックイン","p":"全物件","q":"フロントはありますか？","a":"無人運営のためフロントはありません。困ったことがあればいつでもメッセージでご連絡ください。"},{"c":"チェックイン","p":"全物件","q":"荷物を先に送ってもいいですか？","a":"無人のため受け取りができません。滞在中にご自身で受け取るか、最寄りのヤマト運輸営業所（センター止め）へお送りください。"},{"c":"チェックイン","p":"全物件","q":"チェックイン前に荷物を預かってもらえますか？","a":"無人運営のためお預かりできません。ポーターエクスプレス・エクボクローク等の荷物預かりサービスをご利用ください。"},{"c":"チェックイン","p":"全物件","q":"エレベーターはありますか？","a":"ゲスト送信文（案内メール）に記載があります。送信文をご確認の上ご案内してください。"},{"c":"チェックイン","p":"全物件","q":"バリアフリー対応ですか？（車椅子など）","a":"積極的なバリアフリー対応はしておりません。詳細は松野さんに確認を。"},{"c":"チェックアウト","p":"全物件","q":"チェックアウトは何時ですか？","a":"11時です。"},{"c":"チェックアウト","p":"全物件","q":"11時より遅くチェックアウトしたい（レイトアウト）","a":"ご希望の時間をお知らせください。状況を確認します。追加料金が発生する場合があります。"},{"c":"チェックアウト","p":"中野新橋3F","q":"レイトアウトはできますか？料金は？","a":"はい。23時まで1泊半額でご利用いただけます。18時でも大丈夫と伝えてください。"},{"c":"チェックアウト","p":"全物件","q":"11時以降も少しいたい（30分?1時間）","a":"状況によりご対応します。次のゲストのチェックインがある場合は難しいことをお伝えします。"},{"c":"チェックアウト","p":"全物件","q":"16時チェックアウトにしてほしい","a":"それは1泊分に相当する追加料金が必要です。宿泊料金・滞在日数で判断します。"},{"c":"チェックアウト","p":"全物件","q":"チェックアウト後に荷物を少し置いておけますか？","a":"ケースバイケース。次のゲストが来ない場合に限り一部可能なことも。外部荷物預かりサービスをご案内するのが基本。"},{"c":"チェックアウト","p":"全物件","q":"鍵（ドアコード）は何時まで有効ですか？","a":"チェックアウト時刻（11時）まで有効です。レイトの場合はその時刻まで延長します。"},{"c":"延泊・追加料金","p":"全物件","q":"もう1泊延泊したい","a":"空き状況を確認します。Bedsでカレンダー確認→料金確認（OTA予約詳細）→Bedsをブロック→Squareまたは経由OTAで請求。"},{"c":"延泊・追加料金","p":"全物件","q":"延泊の料金はいくらですか？","a":"OTA予約詳細（Beds24またはAirbnb/Booking管理画面）で1泊の金額を確認してからご案内します。"},{"c":"延泊・追加料金","p":"全物件","q":"genius割引で予約しましたが延泊料金は？","a":"genius割引後の金額が基準です。Beds24の金額（定価）ではなく予約詳細の金額をご確認ください。"},{"c":"延泊・追加料金","p":"全物件","q":"人数を増やしたい（追加人数の料金は？）","a":"基本人数を超える場合、1名1泊3,000円の追加料金が発生します（物件により異なる）。住所録V列で確認。"},{"c":"延泊・追加料金","p":"全物件","q":"人数が減った。安くなりますか？","a":"人数減少による割引はございません。"},{"c":"延泊・追加料金","p":"三豊","q":"人数変更はいつまでできますか？","a":"チェックイン前日まで可能です。"},{"c":"延泊・追加料金","p":"全物件","q":"Booking経由で人数変更はできますか？","a":"BookingはOTAシステム上の変更がカスタマーサポート経由となるため、ゲスト側でBookingへ連絡いただくか、日付変更のみ管理画面から可能。追加料金はSquareで請求。"},{"c":"延泊・追加料金","p":"全物件","q":"Airbnb経由で追加請求する方法は？","a":"Airbnbのメッセージ機能→「追加料金を請求」ボタンから請求します。"},{"c":"延泊・追加料金","p":"全物件","q":"BookingでSquareリンクを送る方法は？","a":"BookingチャットはURLが自動削除されることがあるため、メール（cpmpsg2@gmail.com等）でSquareリンクを送付します。"},{"c":"延泊・追加料金","p":"全物件","q":"友人を部屋に招待したい（宿泊はしない）","a":"ご入室は問題ありません。過度な人数の場合はドアコードが無効になる可能性があるため事前に人数をお知らせください。"},{"c":"延泊・追加料金","p":"全物件","q":"友人も一緒に泊まりたい","a":"追加人数分の追加料金が発生します。人数をお知らせいただき確認します。"},{"c":"パスポート","p":"全物件","q":"パスポートを送ってください（初回案内）","a":"Airbnb：メッセージ機能でお送りください。Booking：cpmpsg2@gmail.comへお送りください。"},{"c":"パスポート","p":"全物件","q":"パスポートを送ってきた（Airbnb）。どう対応する？","a":"①人数と枚数を確認②テンプレ返信③Beds24に「5/15 パスポートOK」と日付入りで記録。"},{"c":"パスポート","p":"全物件","q":"パスポートを送ってきた（Booking）。どう対応する？","a":"cpmpsg2@gmail.comで受取→①人数確認②Beds24に記録③チェックインガイドPDFを添付して返信（ドアコード送付済みなら該当部分削除）④物件ラベルをメールに付与。"},{"c":"パスポート","p":"全物件","q":"日本人ゲストにもパスポートは必要ですか？","a":"代表者1名の公的身分証（マイナンバーカード・免許証など氏名・住所・顔写真が1枚で確認できるもの）でOKです。"},{"c":"パスポート","p":"全物件","q":"在留カードは使えますか？","a":"はい、日本在住の外国籍の方は在留カードでOKです。"},{"c":"パスポート","p":"全物件","q":"パスポートはメールで送りたくないと言われた","a":"「当日スタッフが伺いコピー確認完了まで同行者様に外でお待ちいただく可能性がある」旨をお伝えください。たいていそれでメール送付してもらえます。"},{"c":"パスポート","p":"全物件","q":"パスポートを現地で直接見せたいと言われた","a":"「実際に訪問してコピーが完了するまで同行者様には外でお待ちいただく」旨お伝えします。滞在期間・金額・ゲストの反応で訪問対応か判断。"},{"c":"パスポート","p":"全物件","q":"パスポートが宿泊人数より少ない（例：1名予約で9枚来た）","a":"まずゲストに何名で宿泊するか確認します（人数が増えれば追加料金発生）。"},{"c":"パスポート","p":"全物件","q":"パスポートの督促はどうしますか？","a":"ドアコード再送のタイミングで「パスポートのご提出をお願いいたします」とやんわり再依頼。しつこくしてレビューに影響させない。"},{"c":"パスポート","p":"全物件","q":"パスポートのBedsへの記録はどう書く？","a":"チェックイン日の吹き出しに「5/15 パスポートOK」と日付入りで記入。人数不揃いなら「2名OK 残り待ち」と記入。"},{"c":"パスポート","p":"全物件","q":"パスポート確認後のメール返信テンプレは？","a":"Dropbox「ゲスト案内文【永久固定】」フォルダ内のパスポート返信テンプレを使用。ドアコード送付済みの場合その部分は削除して送信。"},{"c":"パスポート","p":"全物件","q":"パスポートメール（cpmpsg2）はいつ確認する？","a":"業務中は定期的にチェック。緊急入室トラブルが来る場合もあるため見落とし厳禁。"},{"c":"パスポート","p":"全物件","q":"パスポートメール（cpmpsg2）からゲストに返信してもいいですか？","a":"緊急時以外はBookingのメッセージ機能へ誘導します。通常問い合わせはBookingチャット、トラブル解決後もBookingへ。"},{"c":"Beds24・ドアコード","p":"全物件","q":"ドアコードはいつ送るべき？","a":"チェックイン1週間前に初回送付。2?3日前に再送（チェックインガイドPDFも一緒に）。"},{"c":"Beds24・ドアコード","p":"全物件","q":"ドアコードの再送のとき注意することは？","a":"必ず管理画面で現在の正しいコードを確認してからコピペ（過去メッセージからの誤コピーに注意）。"},{"c":"Beds24・ドアコード","p":"全物件","q":"ドアコードは何時から有効ですか？","a":"12時から有効になります（社内ルールです。ゲストには伝えない）。"},{"c":"Beds24・ドアコード","p":"全物件","q":"Beds24のコメントには何を書く？","a":"パスポートOK日・アーリー/レイト内容・延泊/追加請求の進捗・注意事項・引継ぎ事項。チェックイン日の吹き出しに記録。"},{"c":"Beds24・ドアコード","p":"全物件","q":"Beds24でフィルタをかけてもいいですか？","a":"複数人が同時ログインするためフィルタは禁止。他の人の画面に影響します。"},{"c":"Beds24・ドアコード","p":"全物件","q":"Beds24に同時にログインするとどうなりますか？","a":"ログアウトされます。アカウントを使い分けてください（raku2.beds / lovotcpm2.beds等）。"},{"c":"Beds24・ドアコード","p":"全物件","q":"Beds24のログインアカウントはいくつありますか？","a":"複数あります。物件ログイン一覧（Dropbox）を確認してください。"},{"c":"Beds24・ドアコード","p":"全物件","q":"Bedsにログインできない・認証メールが来ない","a":"グループLINEで担当者に認証依頼するか、松野さんからBedsのログインURL（logincode付き）を送ってもらう。"},{"c":"Beds24・ドアコード","p":"全物件","q":"リモートロックが「オフライン」になっています","a":"松野さんまたは池田さんに報告。スペアキーで対応（物件により異なる）。"},{"c":"Beds24・ドアコード","p":"全物件","q":"大門3Fのドアコードはどの部屋番号で作成しますか？","a":"301号室のリモートロックで作成します（302は工事中等の場合あり）。"},{"c":"Beds24・ドアコード","p":"全物件","q":"受託（代々木）のBedsはどこから入力しますか？","a":"代々木の貸切の横の吹き出しマークから入力。受託分はBeds24と連動していません。"},{"c":"メッセージ対応","p":"全物件","q":"Booking通知メールはどのアカウントで確認しますか？","a":"cpmlovo1234@gmail.comで確認します（通知用）。ただし返信はこのアドレスからは送れません。"},{"c":"メッセージ対応","p":"全物件","q":"Airbnbのメッセージはどこで確認しますか？","a":"各AirbnbアカウントのOTAサイトに直接ログインして確認。1日1回以上、全アカウントをチェック。"},{"c":"メッセージ対応","p":"全物件","q":"Bookingのメッセージはどこで確認しますか？","a":"Booking管理画面（cpmpsg@gmail.com）に直接ログインして確認。1日1回以上チェック。"},{"c":"メッセージ対応","p":"全物件","q":"メッセージ通知が届かない場合は？","a":"OTAサイトに直接ログインして確認するのが基本。通知メールに頼らない。"},{"c":"メッセージ対応","p":"全物件","q":"Bookingの「返信不要」ボタンはいつ押しますか？","a":"返信不要のメール（予約確定通知等）に対して押す。押さないと翌日Bookingから催促が来る。"},{"c":"メッセージ対応","p":"全物件","q":"Bookingの「返信不要」はBedsからも押せますか？","a":"押せます（予約詳細→メッセージの送信ボタン横）。ただし反映に時間がかかる場合があるため、できればBookingに直接ログインするほうが確実。"},{"c":"メッセージ対応","p":"全物件","q":"メッセージのトーンはどうすれば？","a":"丁寧・親切・上品な高級ホテルの接客品質を意識。AI(チャッピー)使用後は必ず日本語で内容確認してから送信。AI特有の記号（* \" 等）は削除する。"},{"c":"メッセージ対応","p":"全物件","q":"英語テンプレをそのまま送っていいですか？","a":"必ず日本語に訳して意味を確認してから送信。直訳コピペは誤訳リスクがある。"},{"c":"メッセージ対応","p":"全物件","q":"「確認します」の一次対応はどう送る？","a":"「担当者に確認してご連絡します。しばらくお待ちください」と送ってから確認する。"},{"c":"メッセージ対応","p":"全物件","q":"判断に迷う場合は誰に相談しますか？","a":"グループLINEで松野さん・池田さんに相談。緊急時は松野さんに電話（090-3221-0607）。"},{"c":"メッセージ対応","p":"全物件","q":"レビュー（口コミ）の返信は誰がしますか？","a":"松野さんと池田さんが担当。スタッフはレビュー返信しない。"},{"c":"メッセージ対応","p":"全物件","q":"ゲストが「Thank you!」だけ送ってきました。返信は？","a":"Airbnbの「返信不要」ボタンを押す。または短い御礼を送っても可。"},{"c":"メッセージ対応","p":"全物件","q":"チェックアウト後の御礼メールはいつ送りますか？","a":"チェックアウト当日中に送る。Beds24のアウト日コメントに「御礼済み」と記録。"},{"c":"メッセージ対応","p":"全物件","q":"クレーム対応中のゲストに御礼メールは送りますか？","a":"火に油を注ぐ可能性があるため送らない。"},{"c":"メッセージ対応","p":"全物件","q":"トラブル解決後のフォローメッセージは必要ですか？","a":"必須。「解決してよかったです。他にも何かあればいつでもご連絡ください」など丁寧に送る。"},{"c":"ゴミ・清掃","p":"全物件","q":"ゴミはどこに出せばいいですか？","a":"お部屋の玄関内に置いてください。回収スタッフが月・水・金に来ます。前日までにお知らせください。"},{"c":"ゴミ・清掃","p":"全物件","q":"ゴミ回収の依頼はどうすればいいですか？","a":"ゲスト対応グループLINEで「明日〇〇ゴミ回収お願いします」と鳴川様（ららさん）にメンションする。"},{"c":"ゴミ・清掃","p":"全物件","q":"ゴミを玄関外に出してもいいですか？","a":"原則、お部屋の玄関内に置いてください。玄関外への放置は不法投棄になります。"},{"c":"ゴミ・清掃","p":"中野新橋2F","q":"ゴミを玄関外に出してもいいですか？","a":"中野新橋2Fは他テナントがいないため、玄関ドアの外に置いてOKです。"},{"c":"ゴミ・清掃","p":"全物件","q":"滞在中に清掃してもらえますか？","a":"チェックイン・チェックアウト時のみ清掃しています。滞在中の日常清掃はありません。"},{"c":"ゴミ・清掃","p":"全物件","q":"タオルを交換してほしい","a":"ゴミ回収のタイミングで古いタオルを回収し、新しいものをお届けします。必要な場合はお知らせください。"},{"c":"ゴミ・清掃","p":"全物件","q":"シーツを交換してほしい","a":"長期滞在の場合に対応できます。日程とともにご連絡ください。清掃スタッフに依頼します。"},{"c":"ゴミ・清掃","p":"全物件","q":"忘れ物をした","a":"保管します。発送ご希望の場合は発払いでヤマト運輸営業所（センター止め）へ着払い発送が可能です（置き配不可）。"},{"c":"ゴミ・清掃","p":"全物件","q":"忘れ物を着払いで送ってもらえますか？","a":"着払いは置き配不可のため、ゲストの滞在先近くのヤマト営業所へセンター止めでお送りし、取りに来ていただく方法をご提案します。"},{"c":"ゴミ・清掃","p":"全物件","q":"忘れ物は海外発送できますか？","a":"海外発送は手続きが複雑です。まず本当に必要かどうか確認してから対応します（連絡来たら本当に欲しいケース）。"},{"c":"鳴川様連携","p":"全物件","q":"鳴川様（ららさん）に連絡するのはどんな時？","a":"アーリーチェックイン確定・レイトアウト（同日inout時）・ゴミ回収・同日inout・延泊（清掃前の人数変更）・ベビーベッド設置・布団セット依頼。"},{"c":"鳴川様連携","p":"全物件","q":"アーリーチェックインが確定したら鳴川様にどう連絡しますか？","a":"清掃グループLINEで「〇〇 アーリー〇〇時 確定しました」とご連絡。"},{"c":"鳴川様連携","p":"全物件","q":"同日インアウトの場合の対応は？","a":"基本は行っていない。発生する場合は必ず鳴川様に確認。同日inout時はレイト・アーリー共に不可。ゲストには「11時以降は延長不可」と伝える。"},{"c":"鳴川様連携","p":"全物件","q":"三豊（香川）の清掃は鳴川様ですか？","a":"いいえ、三豊は別の清掃業者です。同じ連絡先は使いません。"},{"c":"鳴川様連携","p":"全物件","q":"人数が変わった場合は鳴川様に連絡しますか？","a":"清掃前の段階（チェックイン前）で人数増の場合はタオル枚数等が変わるため連絡する。"},{"c":"荷物・近隣","p":"全物件","q":"チェックインまで荷物を預けられますか？","a":"無人のためお預かりできません。近隣の荷物預かりサービスをご利用ください。物件ごとのガイドをお送りします。"},{"c":"荷物・近隣","p":"全物件","q":"荷物預かりサービスはありますか？","a":"駅前のカラオケ館にポーターエクスプレスが使えます（荷物預かり）。詳細は各物件の荷物預かりガイドをご確認ください。"},{"c":"荷物・近隣","p":"全物件","q":"荷物預かりサービスはありますか？","a":"カラオケ館はありませんが、クロネコヤマトの手ぶら観光サービスや、エクボクローク・バウンスをご利用いただけます。"},{"c":"荷物・近隣","p":"全物件","q":"エクボクロークはどこにありますか？","a":"物件の荷物預かりガイドに最寄り店舗のリンクがあります（リンクが飛ばない場合は検索してください）。"},{"c":"荷物・近隣","p":"全物件","q":"バウンスはどこにありますか？","a":"物件の荷物預かりガイドをお送りします。早朝9時から利用可能な店舗もあります。"},{"c":"荷物・近隣","p":"全物件","q":"近くにコンビニはありますか？","a":"荷物預かりガイドまたはチェックインガイドに最寄り店舗が記載されています。"},{"c":"荷物・近隣","p":"全物件","q":"最寄りのコンビニはどこですか？","a":"ファミリーマート（新宿百人町方面）が最寄りです。"},{"c":"荷物・近隣","p":"全物件","q":"宅配便を受け取れる場所はありますか？","a":"最寄りのヤマト運輸営業所（センター止め）へ送っていただき、ご自身でお受け取りください。施設から徒歩4分の営業所があります。"},{"c":"荷物・近隣","p":"全物件","q":"連絡先の電話番号は何ですか？（入国カード・ビジットジャパン記入用）","a":"050番号をご案内します。宅配便等の連絡先は090-3221-0607（松野）です。"},{"c":"アクセス","p":"全物件","q":"羽田・成田から来たい。どう来るのがいいですか？","a":"バスタ新宿行きのリムジンバスが便利です。新宿からタクシーまたは電車でお越しください。"},{"c":"アクセス","p":"全物件","q":"羽田・成田から来たい。","a":"羽田・成田どちらからも電車1本です。Googleマップのリンクをお送りします。"},{"c":"アクセス","p":"全物件","q":"羽田・成田から来たい。","a":"ANAインターコンチネンタルホテル東京方面からタクシーが便利です。"},{"c":"アクセス","p":"麻布十番","q":"羽田・成田から来たい。","a":"グランドハイアット東京（六本木）からタクシーが便利です。"},{"c":"アクセス","p":"芝浦","q":"羽田・成田から来たい。","a":"コンラッド東京（浜松町）近くが最寄りです。"},{"c":"アクセス","p":"武蔵小山","q":"羽田・成田から来たい。","a":"品川駅を経由するのが便利です。"},{"c":"アクセス","p":"三豊","q":"関西・九州から来たい。","a":"岡山経由（新幹線＋JR予讃線）がおすすめです。"},{"c":"アクセス","p":"三豊","q":"高松空港から来たい。","a":"トヨタレンタカー（高松空港営業所）が便利です。"},{"c":"アクセス","p":"三豊","q":"レンタカーを借りたい","a":"トヨタレンタカーが高松空港・岡山・丸亀駅・観音寺駅に営業所あり（外国人対応・予約サイトあり）。"},{"c":"アクセス","p":"三豊","q":"観光のおすすめは？","a":"三豊観光局サイトをご参照ください（ため池・父母ケ浜等）。"},{"c":"アクセス","p":"全物件","q":"駅から施設までの行き方は？","a":"チェックインガイドとリスティングのアクセスガイド画像をご確認ください。Googleマップリンクもお送りできます。"},{"c":"駐車場","p":"武蔵小山","q":"駐車場はありますか？","a":"駐車スペースはありません。近隣にコインパーキングが複数あります。"},{"c":"駐車場","p":"三豊","q":"駐車場はありますか？台数は？","a":"3台ギリギリ駐車可能です。周辺にパーキングはありません。通行の妨げになる駐車はご遠慮ください。"},{"c":"駐車場","p":"全物件","q":"駐車場はありますか？","a":"専用駐車場はありません。周辺のコインパーキングをご利用ください。"},{"c":"駐車場","p":"全物件","q":"駐車場はありますか？","a":"専用駐車場はありません。周辺のコインパーキングをご利用ください。"},{"c":"駐車場","p":"全物件","q":"コインパーキングはありますか？（近隣）","a":"各物件の荷物預かりガイドまたはGoogleマップで「コインパーキング」と検索してください。"},{"c":"トラブル・設備","p":"曙橋","q":"工事音がします","a":"向かいの建物で建て替え工事中（8:00?17:00、日曜休工、2027年1月末完了予定）。ご不便おかけします。騒音がひどい場合は松野さんに報告。"},{"c":"トラブル・設備","p":"全物件","q":"ブレーカーが落ちました","a":"各物件のブレーカー位置をDropboxの物件情報から確認してゲストへ案内。新宿原町は2階。"},{"c":"トラブル・設備","p":"全物件","q":"お湯が出ません","a":"給湯器のスイッチが入っているか確認していただくようお伝えください。それでも出ない場合は松野さんへ。"},{"c":"トラブル・設備","p":"全物件","q":"設備が壊れています・故障しています","a":"状況の写真をお送りいただき、修理可能か確認します。ゲストに伝えてからブラインドや電球等の軽微なものは鳴川様に報告。"},{"c":"トラブル・設備","p":"六本木","q":"ブラインドの紐が壊れています","a":"鳴川様に写真を送り修理可能か確認。「不便であれば修理に伺うかどうか」をゲストに確認してから対応。"},{"c":"トラブル・設備","p":"西新宿（バロン）","q":"401の郵便受けが開きません","a":"現在402でご案内しています。402の開け方PDFをお送りします。"},{"c":"キャンセル","p":"全物件","q":"台風・大雪・天災でキャンセルしたい","a":"原則として予約時のキャンセルポリシーに基づきます。日程変更・施設変更等柔軟な代替案を提示。独自判断せず松野さんに確認。"},{"c":"キャンセル","p":"全物件","q":"フライトキャンセルでキャンセルしたい","a":"キャンセルポリシー通りの対応が基本。「状況を確認します」と一次対応し松野さんに相談。Airbnbに仲裁依頼されるケースあり（Airbnbが勝手に返金することも）。"},{"c":"キャンセル","p":"全物件","q":"キャンセル料免除をお願いしたい","a":"キャンセルポリシーを案内しつつ、状況と金額によっては1年有効の宿泊クーポン（宿泊費の一部）を提案できる（最終カード）。"},{"c":"キャンセル","p":"全物件","q":"Bookingからキャンセルリクエストが来た","a":"「全額返金のお断り」処理をBooking管理画面で行う（承認ボタンを誤って押さないよう注意）。Bookingカスタマーサポート（03-4563-7151）に電話が確実。"},{"c":"キャンセル","p":"全物件","q":"Bookingで誤ってキャンセル承認を押してしまった","a":"すぐにBookingカスタマーサポート（03-4563-7151）に電話。有料キャンセルとして処理できる可能性がある。"},{"c":"キャンセル","p":"全物件","q":"欠航証明書を提出するから返金してほしい","a":"キャンセルポリシー通りを案内しつつ、松野さんに相談。日程変更で対応できないか提案。"},{"c":"物件情報","p":"全物件","q":"大門の各フロアの違いは？","a":"2F：1室のみ　3F（301?303）：3室で1予約が基本（リニューアル後）　4F：1室のみ（既存予約は3Fにアップグレード済み）。"},{"c":"物件情報","p":"大門3F","q":"既存の4F予約が3Fに変わったのはなぜ？","a":"リニューアルに伴い301?303の3室として運用開始。BEDSに「[3室予約-3Fへupgrade]」と表示されているものが対象。"},{"c":"物件情報","p":"全物件","q":"大門120（A120）のAirbnbアカウントは？","a":"通常の大門と同じアカウントです。"},{"c":"物件情報","p":"全物件","q":"近くにエレベーターはありますか？","a":"ゲスト送信文に記載されています。必ず送信文を確認してからご案内ください。"},{"c":"物件情報","p":"全物件","q":"メトリブの各部屋番号は？","a":"1F：102・106・107　2F：202・203・205　3F：305のみ。"},{"c":"物件情報","p":"全物件","q":"三豊は東京の物件と同じAirbnbアカウントですか？","a":"メトリブと同じアカウント内にリスティングがあります。「瀬戸内海」がキーワード。"},{"c":"物件情報","p":"全物件","q":"中野新橋は何階建てですか？何室ありますか？","a":"2F・3F・4Fに各フロアあり。2Fと3F（＋4F）が主な物件。"},{"c":"物件情報","p":"中野新橋3F","q":"布団を用意してほしいと言われた","a":"押し入れから出して和室に設置。事前に依頼があれば鳴川様に「布団2組設置」を依頼。"},{"c":"物件情報","p":"三豊","q":"Wi-Fiが使えない・遅い","a":"山間部のため電波が弱い場合があります。事前告知済みのためご了承いただくしかない。必要であればポケットWi-Fiの利用をご提案。"},{"c":"物件情報","p":"三豊","q":"テレビが見られない","a":"現在テレビは不具合のため撤去しています。他の娯楽設備等をご案内。"},{"c":"物件情報","p":"三豊","q":"駐車場の台数は？","a":"3台が限界です。それ以上は通行の妨げになるためNG。"},{"c":"物件情報","p":"三豊","q":"観光情報はどこで見られますか？","a":"三豊観光局（公式サイト）をご参照ください。"},{"c":"物件情報","p":"三豊","q":"BBQはできますか？","a":"松野さんに確認が必要なため、状況をグループLINEで共有してください。"},{"c":"請求・Square","p":"全物件","q":"Squareで請求リンクを作るには？","a":"Square管理画面→支払いリンク作成→URLをゲストへ送付。入金前にBedsをブロックする（他の予約が入らないよう）。"},{"c":"請求・Square","p":"全物件","q":"Squareへのログイン情報はどこにありますか？","a":"Dropboxの物件ログイン一覧を参照（rakuokinawa1@gmail.com等 物件ごとに異なる）。"},{"c":"請求・Square","p":"全物件","q":"入金確認方法は？","a":"Square管理画面で確認できます（マニュアルDropbox参照）。"},{"c":"請求・Square","p":"全物件","q":"入金後の対応は？","a":"入金確認→Bedsのブロック解除 or リモートロック時間変更→Beds24にコメント記録→ゲストへ確認の返信。"},{"c":"請求・Square","p":"全物件","q":"BookingのメッセージにSquareリンクを送っても消えてしまう","a":"BookingチャットはURLが自動削除されることがある。メール（パスポートメール等）でSquareリンクを送付。"},{"c":"請求・Square","p":"全物件","q":"Airbnbで追加請求する方法は？","a":"Airbnbのメッセージ機能→「追加料金を請求」ボタンから請求（Squareは不要）。"},{"c":"請求・Square","p":"全物件","q":"スーツケース等の不用品処分料は？","a":"3,000円でお受けします。Squareで請求。"},{"c":"請求・Square","p":"全物件","q":"タオル追加料金は？","a":"追加の場合は実費をSquareで請求します（金額はケースによる）。"},{"c":"Booking操作","p":"全物件","q":"Bookingへのログイン方法は？","a":"Primary IDとPasswordでログイン（ログインIDは使用しない）。認証コードは末尾4649のスマホへ。"},{"c":"Booking操作","p":"全物件","q":"Bookingの認証コードはどのスマホに届きますか？","a":"末尾4649のスマホです。グループLINEで認証依頼してください。"},{"c":"Booking操作","p":"全物件","q":"Bookingで日程変更できますか？","a":"日数変更がない場合は管理画面から変更可能。日数が変わる場合はBookingカスタマーサポート（03-4563-7151）へ電話。"},{"c":"Booking操作","p":"全物件","q":"Bookingで人数変更できますか？","a":"基本はBookingカスタマーサポート経由。追加料金はSquareで請求。Bedsに正しい人数を記録。"},{"c":"Booking操作","p":"全物件","q":"Bookingから「未返信」の催促メールが来た","a":"Bookingの管理画面から返信するか、「返信不要」ボタンを押す。"},{"c":"Booking操作","p":"全物件","q":"Bookingの1泊料金はどこで確認しますか？","a":"Booking管理画面→該当予約の詳細を開いて確認（または松野さんの案内通りBedsでも確認可）。"},{"c":"Booking操作","p":"全物件","q":"Bookingのカスタマーサポートに連絡する方法は？","a":"管理画面→メールボックス→右下「お問い合わせ」からメール可。ただし電話（03-4563-7151）が最速。"},{"c":"Booking操作","p":"全物件","q":"Booking経由の予約でパスポートが来ました","a":"cpmpsg2@gmail.comで受取→Beds24に記録→チェックインガイドPDF添付で返信（ドアコード送付済みの場合はその部分を削除）。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbのアカウントは何個ありますか？","a":"約6?7アカウントあります。物件ごとにアカウントが異なるので物件ログイン一覧で確認。"},{"c":"Airbnb操作","p":"全物件","q":"どのAirbnbアカウントにログインすればいいですか？","a":"物件ログイン一覧を参照。ホスト名（例：「さくら」）でリスティングを探すと見つけやすい。"},{"c":"Airbnb操作","p":"全物件","q":"三豊（香川）はどのAirbnbアカウントですか？","a":"メトリブと同じAirbnbアカウント内にあります（リスティング一覧から選択）。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbのセキュリティチェックが何度も出る","a":"短時間で複数アカウントにログインすると出やすい。シークレットモードを試す、または少し間隔を空けてログインする。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbのレビューを投稿してもいいですか？","a":"レビュー投稿は松野さん・池田さんの担当。スタッフはしない。AI生成とわかる文言が入ると問題になるため。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbのメッセージで予約確定メールが来た。何かする？","a":"自動返信が飛ぶので通常は不要。「予約したよ！楽しみ?」のような直接連絡が来た場合は「ご予約ありがとうございます。お越しをお待ちしています」と返信。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbで「アーリーチェックインリクエスト」が自動承認された","a":"16時以降のリクエストはBookingが自動承認する設定になっています。それ以外は手動で対応。"},{"c":"宿泊明細","p":"全物件","q":"宿泊明細はいつ作りますか？","a":"月初（1?3日頃）と中旬（15?18日頃）の2回。"},{"c":"宿泊明細","p":"全物件","q":"宿泊明細の手順は？","a":"①OTAサイトから前月OUT分のデータをダウンロード②Bedsカレンダーと件数・人数を照合③Airbnbは国籍確認④合計欄の数式を確認⑤池田さんへ報告。"},{"c":"宿泊明細","p":"全物件","q":"宿泊明細に漏れがないか確認する方法は？","a":"Beds24のカレンダー一覧と明細の件数・宿泊人数を照合（マニュアル④参照）。"},{"c":"宿泊明細","p":"全物件","q":"Bookingのコミッションはどこで確認しますか？","a":"Booking管理画面の予約詳細。物件によってコミッション率が異なるためDropboxのBookingコミッションファイルで確認。"},{"c":"宿泊明細","p":"全物件","q":"三豊の宿泊明細も作りますか？","a":"はい、6月より追加対応。後藤さんが月次で集計。"},{"c":"宿泊明細","p":"全物件","q":"RAKUと中野新橋・メトリブの宿泊明細の担当は？","a":"RAKUシート：松尾さん担当。中野新橋・メトリブシート：松本さん担当。"},{"c":"勤怠・シフト","p":"全物件","q":"勤怠はどうやって申請しますか？","a":"Googleフォームから業務ごとに申請。時刻ではなく稼働した時間を記入（例：30分→「00:30」）。名前を間違えると他の人に加算されるので注意。"},{"c":"勤怠・シフト","p":"全物件","q":"業務の種類はどう分けて申請しますか？","a":"レクチャー・メッセージ対応・マニュアル確認・ログイン認証・メール振り分けなどに分けて申請。"},{"c":"勤怠・シフト","p":"全物件","q":"請求書はいつ・どこへ送りますか？","a":"月初に請求書を発行し松野さんの個人LINEへ送付（月末締め・25日払い）。"},{"c":"勤怠・シフト","p":"全物件","q":"シフト表はどこで確認しますか？","a":"DropboxのExcelファイル（勤務予定表）で確認。26年6月?タブの27行目以降が確定シフト。"},{"c":"勤怠・シフト","p":"全物件","q":"シフトを変更・追加したい","a":"ゲスト対応グループLINEで共有してから担当者に変更してもらう（自分でシフト表を触らない）。"},{"c":"勤怠・シフト","p":"全物件","q":"出勤・退勤時に何をすれば？","a":"グループLINEで「出勤します」「退勤します」と一言報告。退勤時に引継ぎ事項があれば合わせて報告。"},{"c":"勤怠・シフト","p":"全物件","q":"勤怠管理シートで権限申請が必要？","a":"はい。プライベートのGoogleアカウントから「編集者」の権限申請をして承認してもらってください。"},{"c":"業務全般","p":"全物件","q":"始業時に何をすればいいですか？","a":"①ゲスト対応グループLINEで前シフトの引継ぎ・地雷情報を確認②全Airbnbアカウント・Bookingメッセージの返信漏れ確認③Bedsのコメントを確認。"},{"c":"業務全般","p":"全物件","q":"終業時に何をすればいいですか？","a":"①全Airbnb・Bookingを確認し返信漏れなし②グループLINEで「退勤します」報告③引継ぎ事項があれば報告④勤怠フォームを申請。"},{"c":"業務全般","p":"全物件","q":"引継ぎはどこでしますか？","a":"ゲスト対応グループLINE（Premier site）で行います。個人グループでの引継ぎは禁止。"},{"c":"業務全般","p":"全物件","q":"緊急時はどこに電話しますか？","a":"松野さん：090-3221-0607（出るまで鳴らす）。"},{"c":"業務全般","p":"全物件","q":"池田さんの連絡先は？","a":"会社携帯：090-5895-9794"},{"c":"業務全般","p":"全物件","q":"マニュアルはどこにありますか？","a":"Dropbox→■■■共有資料■宿泊関連→業務マニュアルフォルダ。社内リンク集（Excelファイル）も参照。"},{"c":"業務全般","p":"全物件","q":"Dropboxでフィルタをかけてもいいですか？","a":"複数人が同じアカウントにログインしているためフィルタは絶対にかけない。"},{"c":"業務全般","p":"全物件","q":"ログイン情報はどこにありますか？","a":"Dropbox→「その他ログイン情報」Excelファイル（cpmlovo1234 or 物件ログイン一覧）。"},{"c":"業務全般","p":"全物件","q":"詐欺メール（Booking名義の偽クレーム）が来た","a":"Booking.comはこのような親切な連絡はしない。不審なリンクは絶対に踏まないこと。松野さんに報告。"},{"c":"業務全般","p":"全物件","q":"Bedsにコメントを残す際の基本は？","a":"日付入り・誰が何をしたかを簡潔に記録。例：「5/15 パスポートOK（きゅう）」「5/20 延泊確認・Square送付済（池田）」。"},{"c":"業務全般","p":"全物件","q":"物件名を間違えそうです。覚え方は？","a":"新神楽坂＝Newが付く→「新」神楽坂、付かないほう→神楽坂（原町）。Airbnbはホスト名（さくら等）でリスティング特定が早い。"},{"c":"業務全般","p":"全物件","q":"AirbnbとBookingの物件識別方法は？","a":"Airbnb：ログイン一覧のホスト名で確認。Booking：管理画面J列の施設名で確認。"},{"c":"業務全般","p":"全物件","q":"パスポートメールの返信ラベルはどうつけますか？","a":"対応後に該当物件名のラベルを付ける（例：「芝浦」「大門」等）。フラグ・スターも活用。"},{"c":"業務全般","p":"全物件","q":"Bedsに記録が残っていない場合はどうしますか？","a":"OTAのメッセージ履歴を遡って状況を把握。遡るクセをつけることが重要。"},{"c":"設備・備品","p":"全物件","q":"冷蔵庫はありますか？","a":"はい、全室にあります。お水も入れています（無料）。"},{"c":"設備・備品","p":"全物件","q":"電気ポット・ケトルはありますか？","a":"はい、ご用意しています。"},{"c":"設備・備品","p":"全物件","q":"傘はありますか？","a":"備え付けていません。近くのコンビニでお買い求めください。"},{"c":"設備・備品","p":"全物件","q":"自転車は借りられますか？","a":"貸し出し設備はありません。"},{"c":"設備・備品","p":"全物件","q":"プリンターはありますか？","a":"ありません。近くのコンビニ（マルチコピー機）をご利用ください。"},{"c":"設備・備品","p":"全物件","q":"延長コード・コンセントは足りていますか？","a":"各部屋に標準装備していますが、不足の場合はお知らせください。"},{"c":"設備・備品","p":"全物件","q":"ベビーチェア・子ども用食器はありますか？","a":"ありません。ご自身でお持ちいただくか、現地でご購入ください。"},{"c":"設備・備品","p":"全物件","q":"ペットを連れていいですか？","a":"ペット不可です。"},{"c":"設備・備品","p":"全物件","q":"駐輪場はありますか？","a":"物件により異なります。松野さんに確認してください。"},{"c":"設備・備品","p":"三豊","q":"洗濯機・乾燥機はありますか？","a":"はい、洗濯乾燥があります（洗剤も備付）。"},{"c":"設備・備品","p":"三豊","q":"布団はいくつありますか？","a":"ベッド6台＋布団2セット。場所は皆様でご自由にお決めください。"},{"c":"設備・備品","p":"全物件","q":"セーフティボックス（金庫）はありますか？","a":"ない場合がほとんどです。リスティングでご確認ください。"},{"c":"設備・備品","p":"全物件","q":"スチームアイロンですか？ドライアイロンですか？","a":"物件により異なります。ご不明の場合は確認します。"},{"c":"チェックイン","p":"全物件","q":"チェックインは無人ですか？","a":"はい、無人チェックインです。スマートロック（ドアコード）でご入室いただけます。"},{"c":"チェックイン","p":"全物件","q":"チェックイン案内はいつ来ますか？","a":"2?3日前にドアコードとチェックインガイドをお送りします。"},{"c":"チェックイン","p":"全物件","q":"深夜や早朝でもチェックインできますか？","a":"ドアコードがあれば24時間入室可能です。"},{"c":"チェックイン","p":"全物件","q":"ゲストへの対応はどのOTAで行うのが基本ですか？","a":"AirbnbはAirbnbのメッセージ機能、BookingはBooking管理画面またはBedsから返信が基本。1234メールからの返信はゲストに届かない。"},{"c":"チェックイン","p":"全物件","q":"入室できないトラブルの時の連絡先は？","a":"松野さん：090-3221-0607（緊急）。池田さん：090-5895-9794。"},{"c":"ゴミ・清掃","p":"全物件","q":"ゴミ袋はありますか？","a":"はい、備え付けています。"},{"c":"ゴミ・清掃","p":"全物件","q":"分別は必要ですか？","a":"可燃・資源等の分別方法はチェックインガイドをご確認ください。"},{"c":"ゴミ・清掃","p":"全物件","q":"ゴミ出しの曜日は？","a":"清掃スタッフの回収は月・水・金です。前日までにお知らせください。ゴミ収集日は物件所在地の自治体ルールに従います。"},{"c":"ゴミ・清掃","p":"全物件","q":"部屋が汚れていた（チェックイン時）","a":"状況の写真をお送りいただき、すぐに清掃スタッフに対応させます。"},{"c":"アクセス","p":"全物件","q":"タクシーを呼ぶには？","a":"GOアプリ・Uberをご利用ください。"},{"c":"アクセス","p":"全物件","q":"Suica・ICカードは使えますか？","a":"電車・バスはICカードが使えます。物件内の支払いには使えません。"},{"c":"アクセス","p":"全物件","q":"空港から施設まで何分かかりますか？","a":"物件とルートにより異なります。Googleマップのリンクをお送りします。"},{"c":"トラブル・設備","p":"全物件","q":"Wi-Fiのパスワードがわかりません","a":"チェックインガイドに記載があります。ご確認ください。見当たらない場合はお知らせください。"},{"c":"トラブル・設備","p":"全物件","q":"ドアが開きにくい","a":"メトリブ106・107号室はドアが少し固い場合があります。強めに押すと開きます。"},{"c":"トラブル・設備","p":"全物件","q":"水漏れ・水が止まらない","a":"すぐに松野さん（090-3221-0607）に電話。緊急の場合は止水栓を閉めるよう案内。"},{"c":"トラブル・設備","p":"全物件","q":"騒音が気になる（近隣から）","a":"状況を確認します。曙橋A103は工事音（平日8?17時）あり。それ以外の騒音は松野さんに報告。"},{"c":"トラブル・設備","p":"全物件","q":"鍵（ドアコード）を変更してほしい","a":"防犯上の理由がある場合は松野さんに報告。リモートロックを変更します。"},{"c":"トラブル・設備","p":"全物件","q":"隣室から音がする","a":"対応が難しい場合は率直にお伝えし、松野さんに相談。"},{"c":"Booking操作","p":"全物件","q":"Booking通知アカウント（cpmpsg）とは何ですか？","a":"Booking専用の通知・連絡先メールです。ゲストとのやり取りはこのアカウントで受取り、返信はBooking管理画面から行うのが基本。"},{"c":"Booking操作","p":"全物件","q":"Airbnb補助ホストとは何ですか？","a":"オーナーが追加したメッセージ対応専用のアカウント。管理画面へのフルアクセスはなく、メッセージのみ操作できます。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbで「No reply needed」ボタンはどう使いますか？","a":"返信不要のメッセージ（Thank you等）に対してOTAサイト上のボタンを押す。Bedsから押すことも可能だが反映が遅い場合あり。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbのリスティングはどのアカウントで見ますか？","a":"物件ログイン一覧のアカウントに入り、リスティング一覧から該当物件を選択。"},{"c":"物件情報","p":"曙橋","q":"曙橋の住所は？","a":"東京都新宿区住吉町（A103新宿区住吉町）。"},{"c":"物件情報","p":"全物件","q":"物件の住所・アクセスはどこで確認しますか？","a":"Dropboxの住所録（物件一覧ファイル）またはリスティングのページで確認。"},{"c":"物件情報","p":"代々木","q":"受託代々木の対応で注意することは？","a":"弊社運用とやり方が異なる場合あり。宿泊名簿確認→返信→Beds（代々木の貸切吹き出し）への記録が基本フロー。"},{"c":"物件情報","p":"全物件","q":"物件一覧・ログイン情報はどこで確認しますか？","a":"Dropbox→「その他ログイン情報」もしくは「物件一覧・住所録」Excelファイル。"},{"c":"物件情報","p":"全物件","q":"新神楽坂と神楽坂（原町）の違いは？","a":"Newが付いていれば「新」神楽坂、なければ神楽坂（原町）。"},{"c":"キャンセル","p":"全物件","q":"自然災害でキャンセルしたい","a":"キャンセルポリシーに基づいて対応しますが、特別な配慮が必要と判断した場合は松野さんに相談。"},{"c":"キャンセル","p":"全物件","q":"クーポン（宿泊券）はどんな時に提案しますか？","a":"強硬なキャンセル要求が来たとき等、最終手段として1年有効・全施設共通・譲渡可能の宿泊クーポンを提案。独自判断せず松野さんに確認してから提案。"},{"c":"業務全般","p":"全物件","q":"Bedsからメッセージを送ると届きますか？（Booking）","a":"Booking管理画面と連動していますが、タイムラグが出ることがあります。重要な連絡はBookingに直接ログインして送るのが確実。"},{"c":"業務全般","p":"全物件","q":"Google Meet・Zoomのリンクはどう作りますか？","a":"Googleカレンダーで予定を作成し「Google Meetの参加情報を追加」でリンクが発行されます。"},{"c":"業務全般","p":"全物件","q":"Dropboxが開けない・ファイルが見つからない","a":"フィルタがかかっていないか確認。それでも見つからない場合はグループLINEで場所を確認。"},{"c":"業務全般","p":"全物件","q":"AIツール（ChatGPT等）の使い方の注意点は？","a":"文章作成後は必ず日本語で意味を確認してから送信。記号（* \" 等）は削除。英文そのままコピーしない。AIが作成したとわかる文言もNG（レビューに入れると問題になる）。"},{"c":"業務全般","p":"全物件","q":"Bedsの「タイトル変更」は何のためにしますか？","a":"アーリー・レイト・延泊・注意事項等を一目でわかるようにするため（例：「アーリー15時」「地雷注意」等）。"},{"c":"業務全般","p":"全物件","q":"「地雷ゲスト」とはどういう意味ですか？","a":"クレームを入れやすい・要求が多い・トラブルになりやすいゲストのこと。Bedsのコメントや引継ぎLINEで「注」「地雷」等と記録されている場合はこまめに状況を確認する。"},{"c":"業務全般","p":"全物件","q":"勤怠申請の「作業時間」の入力方法は？","a":"稼働した「時刻」ではなく「時間」を入力。例：30分稼働→「00:30」、2時間30分→「02:30」。"},{"c":"業務全般","p":"全物件","q":"タスク管理シートはどこにありますか？","a":"Googleスプレッドシートでタスク管理シートが運用中（cpmlovo1234アカウントからアクセス）。担当者備考・次回作業日なども記入する。"},{"c":"業務全般","p":"全物件","q":"Googleカレンダーでシフトを確認できますか？","a":"はい、cpmlovo1234アカウントのGoogleカレンダーにシフトが反映されています（試験運用中）。"},{"c":"延泊・追加料金","p":"メトリブ3F","q":"メトリブ3Fの基本人数と追加料金は？","a":"最大8名。4名まで基本料金内。5名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"メトリブ1F","q":"メトリブ1Fの基本人数と追加料金は？","a":"最大8名。6名まで基本料金内。7名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"メトリブ2F","q":"メトリブ2Fの基本人数と追加料金は？","a":"最大8名。6名まで基本料金内。7名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"中野新橋2F","q":"中野新橋2Fの基本人数と追加料金は？","a":"最大10名。6名まで基本料金内。7名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"中野新橋3F","q":"中野新橋3Fの基本人数と追加料金は？","a":"最大16名。8名まで基本料金内。9名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"武蔵小山","q":"武蔵小山の基本人数と追加料金は？","a":"最大14名（12名程度推奨）。6名まで基本料金内。7名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"曙橋","q":"曙橋の基本人数と追加料金は？","a":"最大12名。4名まで基本料金内。5名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"西新宿（バロン）","q":"西新宿（バロン）の基本人数と追加料金は？","a":"最大6名。4名まで基本料金内。5名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"神楽坂（原町）","q":"神楽坂（原町）の基本人数と追加料金は？","a":"最大16名。8名まで基本料金内。9名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"芝浦","q":"芝浦の基本人数と追加料金は？","a":"最大5名。3名まで基本料金内。4名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"西麻布","q":"西麻布の基本人数と追加料金は？","a":"最大6名。4名まで基本料金内。5名以上は1名1泊5,000円の追加料金が発生します（西麻布は単価高め）。"},{"c":"延泊・追加料金","p":"代々木","q":"代々木の基本人数と追加料金は？","a":"最大12名。6名まで基本料金内。7名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"新神楽坂","q":"新神楽坂の基本人数と追加料金は？","a":"最大8名。8名まで基本料金内（追加料金なし）。最大人数を超えることはできません。"},{"c":"延泊・追加料金","p":"麻布十番","q":"麻布十番の基本人数と追加料金は？","a":"最大5名。4名まで基本料金内。5名目は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"大門2F","q":"大門2Fの基本人数と追加料金は？","a":"最大6名。5名まで基本料金内。6名目は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"大門3F","q":"大門3Fの基本人数と追加料金は？","a":"最大10名。8名まで基本料金内。9名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"大門4F","q":"大門4Fの基本人数と追加料金は？","a":"最大10名。8名まで基本料金内。9名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"六本木","q":"六本木の基本人数と追加料金は？","a":"最大12名。8名まで基本料金内。9名以上は1名1泊3,000円の追加料金が発生します。"},{"c":"延泊・追加料金","p":"三豊","q":"三豊の基本人数と追加料金は？","a":"最大8名。6名まで基本料金内。7名以上は1名1泊5,000円の追加料金が発生します（三豊は単価高め）。"},{"c":"チェックイン","p":"全物件","q":"アーリーチェックインの料金はいくらですか？","a":"通常16時まで1時間2,000円。2時間程度は無料サービスで案内可能。午前到着は基本1泊分の料金。5泊以上または宿泊20万円超の長期滞在は12時以降無料。判断に迷う場合は責任者へ相談。"},{"c":"チェックイン","p":"全物件","q":"アーリーチェックインの対応手順は？","a":"①Bedsカレンダーで空き確認（当日リクエストは鳴川様に先確認）→②料金案内・入金確認→③リモートロックのドアコード有効時間を前倒し（60分余裕を持たせて設定）→④鳴川様へ清掃グループLINEで連絡→⑤Bedsにコメント記録。"},{"c":"延泊・追加料金","p":"全物件","q":"延泊対応の手順は？","a":"①Bedsカレンダーで空き確認（同日inoutは鳴川様に要相談）→②必要に応じて仮ブロック→③料金確認（OTA予約詳細）→④Square請求・入金確認→⑤リモートロック時間延長→⑥Beds最新化・コメント記録→⑦清掃スケジュール変更が必要な場合は鳴川様へ連絡。"},{"c":"延泊・追加料金","p":"全物件","q":"Booking.com経由の延泊でシステムに日付が反映されない場合は？","a":"2?3ヶ月以上先の場合はSquare請求で対応可能だが、Booking上の予約内容には変更後の日付が反映されない。システムへの反映を希望する場合はBookingカスタマーサポート（03-4563-7151）へ変更リクエストを依頼（3?5営業日かかる）。"},{"c":"キャンセル","p":"全物件","q":"台風・フライトキャンセル時の最初の返信の内容は？","a":"キャンセルポリシーが適用される旨を丁寧に案内しつつ、日程変更や施設変更での柔軟対応が可能な旨を添える。最初からクーポンの話は出さない。状況が変わったら再連絡をもらうよう案内し、その後必ず松野さんに相談する。"},{"c":"キャンセル","p":"全物件","q":"台風・フライトキャンセルで宿泊クーポンはいつ提案しますか？","a":"キャンセルポリシー通りの対応が難しい場合の最終手段として提案。1年有効・プレミアスイーツグループ全施設共通・譲渡可能の宿泊クーポンを宿泊費の一部として発行。独自判断せず必ず松野さんに確認してから提案する。"},{"c":"トラブル・設備","p":"全物件","q":"ブレーカーが何度も落ちる場合のゲストへの対応文は？","a":"複数エアコンや電子レンジ・ドライヤー・洗濯機の同時使用が原因の場合あり。使用中の電化製品と分電盤の写真を送ってもらい状況確認。エアコンのみで繰り返す場合は異常の可能性あり→必要に応じてスタッフ点検を手配。日英両言語での案内文あり（マニュアル参照）。"},{"c":"パスポート","p":"全物件","q":"パスポートを現地で直接提出したい場合の返信テンプレは？（英語）","a":"「ご到着日の午前6時30分よりスタッフを手配します。全員のパスポート確認・コピー・ドアコード発行まで約60分かかります。全員分のコピーをご持参いただければ約20分短縮できます。」と案内。時間は状況に応じて修正すること。"},{"c":"設備・備品","p":"全物件","q":"タオル追加リクエストへの対応は？（メトリブ）","a":"基本1名あたり大1・小1の2セット。メトリブ建物内で清掃がある場合は持参可能。清掃なし・宿泊費20万円以下・4泊の場合は駆けつけ費用として1回3,000円。20万円超・5泊以上の長期はできる限り対応（ららさんの会社に追加依頼・有料）。"},{"c":"メッセージ対応","p":"全物件","q":"御礼メールの送信手順は？","a":"①Bedsにログインし当日チェックアウト・前日未送付分を確認→②メッセージ履歴でトラブル・クレームなしを確認（ある場合は送らない）→③宛名はコピペ（スペルミス防止）→④チェックアウト11時後またはレイトアウト後に送信→⑤Bedsにコメント「御礼済み」を記録。"},{"c":"メッセージ対応","p":"全物件","q":"御礼メールを送ってはいけない場合は？","a":"滞在中にトラブルやクレームが生じている場合は送信しない。チェックアウト後にすでにお礼文を送っている場合も重複になるので送らない。タイミングに違和感がある場合は責任者に報告して適切な対応を取る。"},{"c":"Beds24・ドアコード","p":"全物件","q":"リモートロックへのログイン方法は？","a":"https://connect.remotelock.jp/sign-in にアクセス。アカウント①：nakanoshinbashisakura@gmail.com / shisan9350（CPM管理分）。アカウント②：3miyuki9350@gmail.com / cpmm9350（RAKU・CPMM・JAPASTY管理分）。物件によりアカウントが異なるので一覧で確認。"},{"c":"Beds24・ドアコード","p":"全物件","q":"リモートロックの電池残量はいつ確認しますか？","a":"朝と午後の1日2回、一覧タブで電池マークを確認。40%未満になったら鳴川様に交換依頼（清掃時にまとめて依頼・複数部屋がある物件は極力まとめて）。長期滞在予約がある場合は早めに依頼すること。"},{"c":"Beds24・ドアコード","p":"全物件","q":"リモートロックのWi-Fiが切断されている場合の対応は？","a":"切断後72時間以内は自動再接続機能が働くため、24時間は様子を見る。それ以降は鳴川様へ再接続依頼（プログラミングコードも共有する）。切断中でも同期済み番号は利用可能だが、新規番号の発番・同期は不可。"},{"c":"チェックイン","p":"全物件","q":"チェックイン時間は何時ですか？","a":"標準チェックインは15時です。アーリーチェックインをご希望の場合は別途ご相談ください。"},{"c":"チェックイン","p":"全物件","q":"セルフチェックインの手順を教えてください","a":"チェックインガイドに詳細な手順が記載されています。ドアコードは3日前にお送りします。ガイドに従ってお部屋にお入りください。"},{"c":"チェックイン","p":"全物件","q":"チェックイン前にトラブルが発生した場合は？","a":"OTAのメッセージ機能で直ちにご連絡ください。担当スタッフが対応します。"},{"c":"チェックアウト","p":"全物件","q":"チェックアウト時間は何時ですか？","a":"標準チェックアウトは11時です。レイトチェックアウトをご希望の場合は別途ご相談ください。"},{"c":"チェックアウト","p":"全物件","q":"チェックアウト後に荷物を部屋に置いておけますか？","a":"チェックアウト後の荷物保管は基本的に承っておりません。荷物預かりサービスをご希望の場合はご相談ください。"},{"c":"チェックアウト","p":"全物件","q":"チェックアウト時に何か手続きは必要ですか？","a":"特別な手続きは不要です。ドアを施錠してお部屋を出ていただくだけで大丈夫です。"},{"c":"パスポート","p":"全物件","q":"パスポートの写真はどのように送ればよいですか？","a":"Airbnb/Bookingのメッセージ機能でパスポートの写真（顔写真ページ）を送付してください。"},{"c":"パスポート","p":"全物件","q":"パスポートの代わりに運転免許証は使えますか？","a":"外国人ゲストの場合はパスポートが必須です。旅館業法の規定により運転免許証では代替できません。"},{"c":"パスポート","p":"全物件","q":"パスポートはいつまでに送ればいいですか？","a":"チェックイン7〜5日前を目安にお送りください。"},{"c":"Beds24・ドアコード","p":"全物件","q":"ドアコードが届いていない場合はどうすればいいですか？","a":"チェックイン3日前にドアコードガイドを送付しています。届いていない場合はOTAのメッセージ機能でご連絡ください。"},{"c":"Beds24・ドアコード","p":"全物件","q":"ドアコードを入力してもドアが開かない","a":"まず＊（アスタリスク）を押してからコードを入力してください。それでも開かない場合はすぐにご連絡ください。"},{"c":"Beds24・ドアコード","p":"全物件","q":"Beds24の予約管理でドアコードはどう発行しますか？","a":"Beds24のシステム内で予約に紐づいたドアコードが自動発行されます。詳細は操作マニュアルをご確認ください。"},{"c":"設備・備品","p":"全物件","q":"電子レンジの使い方がわからない","a":"チェックインガイドに電子レンジの基本操作が記載されています。不明な点はご連絡ください。"},{"c":"設備・備品","p":"全物件","q":"洗濯機の使い方を教えてください","a":"洗濯乾燥機の使い方はチェックインガイドに記載があります。洗剤はご用意しています。"},{"c":"設備・備品","p":"全物件","q":"冷蔵庫はありますか？","a":"はい、全物件にご用意しています。"},{"c":"設備・備品","p":"全物件","q":"IHクッキングヒーターの使い方がわからない","a":"チェックインガイドをご参照ください。不明な場合はご連絡いただければ案内します。"},{"c":"設備・備品","p":"全物件","q":"エアコンのリモコンが見当たらない","a":"クローゼット内やテレビ台周辺をご確認ください。見当たらない場合はご連絡ください。"},{"c":"設備・備品","p":"全物件","q":"給湯器の操作方法を教えてください","a":"チェックインガイドに給湯器の操作方法が記載されています。"},{"c":"設備・備品","p":"全物件","q":"バスルームの使い方を教えてください","a":"チェックインガイドにシャワー・バスの使い方が記載されています。"},{"c":"設備・備品","p":"全物件","q":"石鹸・ボディソープはありますか？","a":"はい、アメニティセットにご用意しています。"},{"c":"設備・備品","p":"全物件","q":"歯ブラシはありますか？","a":"はい、アメニティセットに含まれています。"},{"c":"設備・備品","p":"全物件","q":"スリッパはありますか？","a":"はい、ご用意しています。"},{"c":"設備・備品","p":"全物件","q":"延長コードはありますか？","a":"お部屋によって異なります。必要な場合はご連絡ください。"},{"c":"設備・備品","p":"全物件","q":"変換アダプターはありますか？","a":"ご用意していない場合があります。必要な場合はご自身でご持参ください。"},{"c":"トラブル・設備","p":"全物件","q":"水道が出ない場合はどうすればいいですか？","a":"元栓が閉まっている可能性があります。それでも出ない場合はすぐにご連絡ください。"},{"c":"トラブル・設備","p":"全物件","q":"暖房・冷房が効かない場合はどうすればいいですか？","a":"エアコンのフィルターや設定温度をご確認ください。改善しない場合はご連絡ください。"},{"c":"トラブル・設備","p":"全物件","q":"トイレが詰まった場合はどうすればいいですか？","a":"すぐにご連絡ください。緊急対応スタッフが訪問します。"},{"c":"トラブル・設備","p":"全物件","q":"虫が出た場合はどうすればいいですか？","a":"殺虫スプレー等があれば対応いただくか、ご連絡いただければスタッフが対応します。"},{"c":"トラブル・設備","p":"全物件","q":"騒音がひどい場合はどうすればいいですか？","a":"周辺の状況等をお知らせください。対応を検討します。"},{"c":"ゴミ・清掃","p":"全物件","q":"可燃ゴミと不燃ゴミの分け方を教えてください","a":"各物件のゴミ捨てルールに従ってください。分別方法はゴミ捨て案内ファイルまたは掲示物をご確認ください。"},{"c":"ゴミ・清掃","p":"全物件","q":"ゴミ袋はどこにありますか？","a":"キッチン下の収納またはクローゼット内をご確認ください。"},{"c":"ゴミ・清掃","p":"全物件","q":"長期滞在の場合の清掃頻度はどうなりますか？","a":"7泊以上の場合は中間清掃を実施しています。詳細は担当者にご確認ください。"},{"c":"アクセス","p":"全物件","q":"空港からのアクセス方法を教えてください","a":"物件のチェックインガイドにアクセス方法が記載されています。電車またはリムジンバスが便利です。"},{"c":"アクセス","p":"全物件","q":"最寄りのコンビニはどこですか？","a":"物件近くにコンビニがあります。チェックインガイドの地図をご参照ください。"},{"c":"アクセス","p":"全物件","q":"スーパーマーケットはありますか？","a":"物件近くにスーパーがあります。チェックインガイドをご参照ください。"},{"c":"駐車場","p":"全物件","q":"駐車場はありますか？","a":"基本的に物件内の駐車場はございません。近隣のコインパーキングをご利用ください。"},{"c":"駐車場","p":"全物件","q":"近くのコインパーキングを教えてください","a":"Google マップ等で「駐車場」と検索するか、お問い合わせいただければ近隣の駐車場情報をお伝えします。"},{"c":"キャンセル","p":"全物件","q":"キャンセルポリシーはどうなっていますか？","a":"OTA（Airbnb/Booking）の予約ページに記載のキャンセルポリシーをご確認ください。"},{"c":"キャンセル","p":"全物件","q":"急なキャンセルは可能ですか？","a":"キャンセルポリシーに従いキャンセル料が発生する場合があります。詳細は予約確認メールをご参照ください。"},{"c":"請求・Square","p":"全物件","q":"支払い方法は何がありますか？","a":"OTA決済のほか、Squareによるクレジットカード決済が可能です。"},{"c":"請求・Square","p":"全物件","q":"領収書は発行できますか？","a":"はい、発行可能です。担当者にご連絡ください。"},{"c":"請求・Square","p":"全物件","q":"追加料金はどのように請求されますか？","a":"Squareまたは現金にて対応しています。詳細は担当者にご確認ください。"},{"c":"業務全般","p":"全物件","q":"社内リンク集の使い方を教えてください","a":"目次シートから各物件カードをクリックして物件シートに移動します。ファイル名をクリックするとDropboxが直接開きます。"},{"c":"業務全般","p":"全物件","q":"返信マニュアルの使い方を教えてください","a":"返信マニュアルシートでお問い合わせ内容を確認し、該当行のAirbnbまたはBookingボタンをクリックするとDropboxのWordファイルが開きます。"},{"c":"業務全般","p":"全物件","q":"新しいテンプレートを追加したい場合はどうすればいいですか？","a":"社内リンク集の返信マニュアルシートを更新し、Dropboxに新しいファイルを追加してリンクを貼ってください。"},{"c":"業務全般","p":"全物件","q":"Dropboxのファイルが開かない場合はどうすればいいですか？","a":"Dropboxへのアクセス権限をご確認ください。権限がない場合は管理者にお問い合わせください。"},{"c":"業務全般","p":"全物件","q":"物件別のリンク集はどこで確認できますか？","a":"社内リンク集の目次シートから各物件のシートにジャンプできます。物件ごとにチェックインマニュアルや旅館業許可証などが整理されています。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbでゲストへメッセージを送る方法は？","a":"Airbnbの管理画面から「メッセージ」→ 該当予約を選択し、メッセージを入力して送信してください。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbの予約確認方法を教えてください","a":"Airbnb管理画面の「予約管理」から確認できます。"},{"c":"Airbnb操作","p":"全物件","q":"Airbnbでレビューを書く方法は？","a":"Airbnb管理画面の予約履歴から該当予約を選択し、「レビューを書く」をクリックしてください。"},{"c":"Booking操作","p":"全物件","q":"Booking.comでゲストへメッセージを送る方法は？","a":"Booking.comエクストラネットの「メッセージ」から送信できます。"},{"c":"Booking操作","p":"全物件","q":"Booking.comの予約確認方法を教えてください","a":"Booking.comエクストラネットの「予約」タブから確認できます。"},{"c":"Booking操作","p":"全物件","q":"Booking.comの自動メッセージ設定はどこからできますか？","a":"エクストラネットの「メッセージ」→「自動メッセージ」から設定できます。"},{"c":"勤怠・シフト","p":"全物件","q":"シフトの確認方法を教えてください","a":"担当者またはシフト管理ツールでご確認ください。"},{"c":"勤怠・シフト","p":"全物件","q":"勤怠の申請はどのように行いますか？","a":"所定の勤怠管理システムから申請してください。"},{"c":"宿泊明細","p":"全物件","q":"宿泊明細の発行方法は？","a":"Squareまたは宿泊管理システムから発行できます。詳細は担当者にご確認ください。"},{"c":"宿泊明細","p":"全物件","q":"宿泊明細に記載すべき項目は？","a":"宿泊日数・料金・ゲスト名・物件名・チェックイン・アウト日を記載します。"},{"c":"鳴川様連携","p":"全物件","q":"鳴川様への連絡が必要な場合はどのような時ですか？","a":"ベビーベッドのセット依頼やゲストの特別リクエスト対応時に連絡が必要です。"},{"c":"鳴川様連携","p":"全物件","q":"鳴川様への連絡手段は何ですか？","a":"担当者から案内されている連絡先（LINE・電話等）でご連絡ください。"},{"c":"メッセージ対応","p":"全物件","q":"複数物件のゲストに一斉連絡したい場合はどうしますか？","a":"各OTAの管理画面から個別に送信するか、テンプレートを活用して効率よく対応してください。"},{"c":"メッセージ対応","p":"全物件","q":"英語でのゲスト対応が必要な場合のテンプレートはありますか？","a":"Dropboxに各テンプレートの英語版（日英版・マルチ言語版）が用意されています。返信マニュアルまたは物件シートをご確認ください。"},{"c":"延泊・追加料金","p":"全物件","q":"延泊の場合、追加清掃費は発生しますか？","a":"延泊期間に応じて追加清掃費が発生する場合があります。担当者にご確認ください。"},{"c":"延泊・追加料金","p":"全物件","q":"追加宿泊者が増えた場合の料金はどうなりますか？","a":"追加人数に応じた料金が発生します。詳細はOTAの予約変更またはSquare決済で対応します。"},{"c":"荷物・近隣","p":"全物件","q":"ゲストが荷物を事前に送ってくる場合の受取方法は？","a":"事前にご連絡いただければ対応可能です。宅配便の場合は担当者が受け取ります。"},{"c":"荷物・近隣","p":"全物件","q":"忘れ物の保管期間はどのくらいですか？","a":"原則1ヶ月間保管します。その後は処分となります。"}];

function normalize(s) {
  return (s || '')
    .toString()
    .toLowerCase()
    .replace(/[\s　]/g, '')
    .replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0));
}

function bigrams(s) {
  if (s.length <= 1) return s ? [s] : [];
  const out = [];
  for (let i = 0; i < s.length - 1; i++) out.push(s.substr(i, 2));
  return out;
}

function expandQuery(query) {
  const boost = new Set();
  const cats = new Set();
  for (const c of CONCEPTS) {
    if (c.any.some(t => query.includes(t))) {
      c.boost.forEach(b => boost.add(b));
      (c.cats || []).forEach(cat => cats.add(cat));
    }
  }
  return { boost: [...boost], cats: [...cats] };
}

function scoreEntry(nq, qBigrams, entry, boost, cats) {
  const nQ = normalize(entry.q);
  const nA = normalize(entry.a);
  let s = 0;

  if (nq) {
    if (nQ.includes(nq)) s += 60;
    else if (nA.includes(nq)) s += 25;

    if (qBigrams.length) {
      const eb = new Set(bigrams(nQ + nA));
      let overlap = 0;
      for (const g of qBigrams) { if (eb.has(g)) overlap++; }
      s += (overlap / qBigrams.length) * 35;
    }
  }

  for (const term of boost) {
    const nt = normalize(term);
    if (nQ.includes(nt)) s += 18;
    else if (nA.includes(nt)) s += 9;
  }

  if (cats.includes(entry.c)) s += 22;

  return s;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function populateSelect(id, items, defaultLabel) {
  const sel = document.getElementById(id);
  const opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = defaultLabel;
  sel.appendChild(opt0);
  items.forEach(it => {
    const opt = document.createElement('option');
    opt.value = it;
    opt.textContent = it;
    sel.appendChild(opt);
  });
}

function runSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const catFilter = document.getElementById('categoryFilter').value;
  const propFilter = document.getElementById('propertyFilter').value;

  const nq = normalize(query);
  const qBigrams = bigrams(nq);
  const { boost, cats } = query ? expandQuery(query) : { boost: [], cats: [] };

  let results = QA_DATA.map((entry, idx) => ({
    entry,
    idx,
    score: query ? scoreEntry(nq, qBigrams, entry, boost, cats) : 0,
  }));

  if (catFilter) results = results.filter(r => r.entry.c === catFilter);
  if (propFilter) results = results.filter(r => r.entry.p === propFilter || r.entry.p === '全物件');

  if (query) {
    results = results.filter(r => r.score > 0.5);
    results.sort((a, b) => b.score - a.score || a.idx - b.idx);
    results = results.slice(0, 30);
  } else if (catFilter || propFilter) {
    results = results.slice(0, 100);
  } else {
    results = [];
  }

  renderResults(results, query, catFilter, propFilter);
}

function renderResults(results, query, catFilter, propFilter) {
  const chat = document.getElementById('chat');
  const meta = document.getElementById('resultMeta');

  if (results.length === 0) {
    if (query || catFilter || propFilter) {
      meta.textContent = `「${query}」に一致するQ&Aが見つかりませんでした`;
      chat.innerHTML = '<div class="empty-state">該当するQ&Aが見つかりませんでした。キーワードを変えてお試しください。</div>';
    } else {
      meta.textContent = '';
      chat.innerHTML = '<div class="empty-state">&#128269; 質問や状況を入力するか、上の「よくある質問」から選んでください。<br>例：早くチェックインしたい / 車を止めたい / Wi-Fiのパスワード</div>';
    }
    return;
  }

  meta.textContent = query
    ? `「${query}」に関連するQ&A ${results.length}件`
    : `Q&A ${results.length}件を表示中`;

  chat.innerHTML = results.map(r => {
    const e = r.entry;
    return `
    <div class="qa-item">
      <div class="tags">
        <span class="tag">${escapeHtml(e.c)}</span>
        <span class="tag tag-prop">${escapeHtml(e.p)}</span>
      </div>
      <div class="bubble-row">
        <div class="avatar avatar-q">&#128100;</div>
        <div class="bubble bubble-q">${escapeHtml(e.q)}</div>
      </div>
      <div class="bubble-row row-a">
        <div class="bubble bubble-a">${escapeHtml(e.a)}</div>
        <div class="avatar avatar-a">&#127968;</div>
      </div>
    </div>`;
  }).join('');
}
